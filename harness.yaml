project_name: Agent Harness Lab
output_dir: output
max_artifact_files: 12
check_timeout_seconds: 60
state_dir: .agent-harness
cancel_file: cancel
ignore_dirs:
  - __pycache__
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
checks:
  - name: unit-tests
    command: python -m unittest discover -s tests -v
