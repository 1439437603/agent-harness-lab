project_name: Agent Harness Lab
output_dir: output
max_artifact_files: 12
check_timeout_seconds: 60
state_dir: .agent-harness
cancel_file: cancel
ignore_dirs:
  - __pycache__
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
checks:
  - name: unit-tests
    command: python -m unittest discover -s tests -v
tools:
  - name: project-scan
    description: Scan a target project and produce Markdown, JSON, and JSONL harness artifacts
    command_template: python -m agent_harness_lab.cli run --project {project} --task {task}
    args: project, task
  - name: project-eval
    description: Run the harness and evaluate the generated report for required runtime sections
    command_template: python -m agent_harness_lab.cli eval --project {project} --task {task}
    args: project, task
